<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIIN 사다리게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #05050a; overflow: hidden; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* UI Panel */
        #ui-panel { position: absolute; top: 20px; left: 20px; width: 360px; z-index: 10; background: rgba(10, 10, 18, 0.7); padding: 25px; border-radius: 16px; border: 1px solid rgba(0, 255, 255, 0.3); backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,255,255,0.1); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); max-height: 90vh; overflow-y: auto; }
        #ui-panel::-webkit-scrollbar { width: 6px; }
        #ui-panel::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.3); border-radius: 3px; }

        #leaderboard { position: absolute; top: 20px; right: 20px; width: 280px; z-index: 10; background: rgba(10, 10, 18, 0.7); padding: 20px; border-radius: 16px; border: 1px solid rgba(0, 255, 255, 0.3); backdrop-filter: blur(12px); color: white; display: none; box-shadow: 0 8px 32px rgba(0,255,255,0.1); }
        
        .player-tag { background: rgba(0, 240, 255, 0.15); border: 1px solid #00f0ff; color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .player-tag:hover { background: rgba(0, 240, 255, 0.3); }
        .tag-remove { cursor: pointer; color: #ff0055; font-weight: bold; width: 16px; height: 16px; display: inline-flex; justify-content: center; align-items: center; border-radius: 50%; }
        .tag-remove:hover { background: rgba(255,0,85,0.2); }

        #gravity-warning { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; color: #ff0055; font-size: 80px; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055; display: none; text-align: center; pointer-events: none; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.8; transform: translate(-50%, -50%) scale(0.95); } to { opacity: 1; transform: translate(-50%, -50%) scale(1.05); } }
        
        #result-modal { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 50; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .result-box { background: linear-gradient(145deg, #12121e, #0d0d16); border: 1px solid rgba(0, 255, 255, 0.4); border-radius: 24px; padding: 50px; width: 500px; max-width: 90%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05); animation: popIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .loser-name { color: #ff0055; font-size: 1.8rem; font-weight: 800; text-shadow: 0 0 15px rgba(255,0,85,0.5); margin: 8px 0; background: rgba(255,0,85,0.1); padding: 8px; border-radius: 12px; }
        
        @keyframes popIn { from { transform: scale(0.8) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        
        .neon-text { color: #fff; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(0, 255, 255, 0.3); }
        .btn-neon { background: linear-gradient(135deg, #00c6ff, #0072ff); border: none; color: white; padding: 14px; border-radius: 10px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; width: 100%; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3); }
        .btn-neon:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 114, 255, 0.5); }
        .btn-reset { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); margin-top: 12px; color: #aaa; font-weight: 600; box-shadow: none; font-size: 0.95rem; }
        .btn-reset:hover { background: rgba(255, 255, 255, 0.1); color: #fff; transform: none; }
        
        input[type="text"] { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 255, 255, 0.3); color: #fff; border-radius: 8px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: #00f0ff; background: rgba(0,0,0,0.6); }
        
        .rank-item { padding: 10px; margin-bottom: 6px; border-radius: 8px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; font-weight: 600; border-left: 3px solid transparent; transition: background 0.3s; }
        .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.15), transparent); border-left: 4px solid gold; transform: scale(1.02); }
        .rank-2 { background: linear-gradient(90deg, rgba(192,192,192,0.1), transparent); border-left: 4px solid silver; }
        .rank-3 { background: linear-gradient(90deg, rgba(205,127,50,0.1), transparent); border-left: 4px solid #cd7f32; }

        .range-slider { width: 100%; margin-top: 8px; accent-color: #ff0055; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1 class="text-4xl font-black mb-6 neon-text text-center tracking-wide">KIIN <span class="text-xl text-cyan-400 font-bold">RACING</span></h1>
        
        <label class="text-cyan-300 text-sm font-bold mb-2 block">참가자 명단 설정</label>
        <div class="flex gap-2 mb-3">
            <input type="text" id="player-add-input" placeholder="이름 입력 후 엔터" autocomplete="off">
            <button id="add-player-btn" class="bg-cyan-600/30 border border-cyan-500 hover:bg-cyan-500 text-white font-bold rounded-lg px-4 transition-colors">+</button>
        </div>
        <div id="player-tags" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-3 bg-black/30 rounded-lg border border-gray-700/50 mb-4">
        </div>

        <div class="mb-6 bg-black/30 p-3 rounded-lg border border-gray-700/50">
            <div class="flex justify-between items-center mb-1">
                <label class="text-cyan-300 text-sm font-bold">당첨(벌칙) 인원</label>
                <span id="penalty-count-display" class="text-white font-bold bg-red-500/20 px-2 py-0.5 rounded text-sm text-red-400">2 명</span>
            </div>
            <input type="range" id="penalty-slider" class="range-slider" min="1" max="5" value="2">
        </div>
        
        <button id="start-btn" class="btn-neon">🚀 레이싱 시작!</button>
        <button id="reset-btn" class="btn-neon btn-reset">⟳ 코스 무작위 재배치</button>
    </div>

    <div id="leaderboard">
        <h2 class="text-xl font-bold mb-4 text-cyan-300 border-b border-gray-700 pb-2 flex justify-between">
            <span>🏆 실시간 랭킹</span>
            <span id="live-status" class="text-xs bg-cyan-900 text-cyan-100 px-2 py-1 rounded">진행중</span>
        </h2>
        <div id="rank-list"></div>
    </div>

    <div id="gravity-warning">GRAVITY<br>REVERSED!!</div>

    <div id="result-modal">
        <div class="result-box">
            <h2 class="text-4xl font-black text-yellow-400 mb-2">🎉 레이싱 종료 🎉</h2>
            <p class="text-gray-400 mb-6 pb-4 border-b border-gray-700">최후의 승부가 마무리되었습니다.</p>
            
            <h3 class="text-2xl font-bold text-white mb-4">💥 당첨 (벌칙) 💥</h3>
            <div id="losers-list" class="flex flex-col gap-2 mb-8"></div>
            
            <button onclick="closeResult()" class="btn-neon" style="background: linear-gradient(135deg, #11998e, #38ef7d);">새로운 레이스 준비</button>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        // --- 1. 참가자 및 설정 저장 로직 (LocalStorage) ---
        let playersData = ['철수', '영희', '민수', '지영', '동해', '백두', '한라', '태백'];
        let savedPlayers = localStorage.getItem('kiin_players');
        if (savedPlayers) {
            try { playersData = JSON.parse(savedPlayers); } catch(e) {}
        }
        
        let savedPenalty = localStorage.getItem('kiin_penalty');
        if (savedPenalty) {
            document.getElementById('penalty-slider').value = savedPenalty;
        }

        const colors = ['#00ffff', '#ff00ff', '#00ff00', '#ffff00', '#ff5500', '#0088ff', '#ff0055', '#aaff00', '#ffffff', '#ff8800', '#ffb0b0', '#b0ffb0'];

        function saveData() {
            localStorage.setItem('kiin_players', JSON.stringify(playersData));
            localStorage.setItem('kiin_penalty', document.getElementById('penalty-slider').value);
        }

        function renderPlayerTags() {
            const container = document.getElementById('player-tags');
            container.innerHTML = '';
            playersData.forEach((player, index) => {
                const tag = document.createElement('div');
                tag.className = 'player-tag';
                const color = colors[index % colors.length];
                tag.innerHTML = `
                    <span style="width:10px; height:10px; border-radius:50%; background-color:${color}; box-shadow: 0 0 5px ${color}"></span>
                    ${player}
                    <span class="tag-remove" onclick="removePlayer(${index})">×</span>
                `;
                container.appendChild(tag);
            });
            updatePenaltySlider();
            saveData();
        }

        function addPlayer() {
            const input = document.getElementById('player-add-input');
            const name = input.value.trim();
            if(name && !playersData.includes(name)) {
                playersData.push(name);
                input.value = '';
                renderPlayerTags();
            }
        }

        function removePlayer(index) {
            playersData.splice(index, 1);
            renderPlayerTags();
        }

        document.getElementById('player-add-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') addPlayer();
        });
        document.getElementById('add-player-btn').addEventListener('click', addPlayer);

        function updatePenaltySlider() {
            const slider = document.getElementById('penalty-slider');
            slider.max = Math.max(1, playersData.length - 1);
            if(parseInt(slider.value) > slider.max) slider.value = slider.max;
            document.getElementById('penalty-count-display').innerText = slider.value + ' 명';
        }

        document.getElementById('penalty-slider').addEventListener('input', (e) => {
            document.getElementById('penalty-count-display').innerText = e.target.value + ' 명';
            saveData();
        });

        renderPlayerTags();

        // --- 2. 물리 엔진 및 게임 로직 (최적화 및 30초 플레이타임) ---
        const Engine = Matter.Engine,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Body = Matter.Body,
              Composite = Matter.Composite,
              Constraint = Matter.Constraint,
              Events = Matter.Events;

        let engine, runner, world;
        let marbles = [], particles = [], finishedMarbles = [], sweepers = [], mines = [], luckyBoxes = [], blackholes = [];
        let gravitySwitch = null;
        
        const MAP_WIDTH = 1600;
        // 맵 길이를 줄여 30초 내외로 도착하도록 조정
        const MAP_HEIGHT = 7500; 
        const FINISH_LINE = MAP_HEIGHT - 300;
        
        let cameraY = 0;
        let cameraZoom = 1; 
        
        let isGravityReversed = false;
        let gravityTimer = 0;
        const GRAVITY_DURATION = 150; 
        // 속도감을 위해 기본 중력 약간 상향
        const BASE_GRAVITY = 2.0; 
        
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        let frameCounter = 0;

        function init() {
            engine = Engine.create();
            engine.enableSleeping = true; 
            world = engine.world;
            world.gravity.y = BASE_GRAVITY; 

            handleResize();
            window.addEventListener('resize', handleResize);

            buildMap();

            runner = Runner.create({ isFixed: true, delta: 1000 / 60 });
            Runner.run(runner, engine);

            Events.on(engine, 'collisionActive', handleActiveCollisions);
            Events.on(engine, 'beforeUpdate', updateLogic); 

            requestAnimationFrame(render);
        }

        function handleResize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cameraZoom = Math.min(1.0, Math.max(0.35, window.innerWidth / (MAP_WIDTH + 200)));
        }

        function buildMap() {
            Composite.clear(world);
            Engine.clear(engine);
            marbles = []; finishedMarbles = []; particles = []; sweepers = []; mines = []; luckyBoxes = []; blackholes = [];
            gravitySwitch = null; cameraY = 0; isGravityReversed = false; world.gravity.y = BASE_GRAVITY;
            document.getElementById('gravity-warning').style.display = 'none';
            document.getElementById('leaderboard').style.display = 'none';
            document.getElementById('result-modal').style.display = 'none';

            const wallOpts = { isStatic: true, label: 'wall', friction: 0, restitution: 0.5 };
            let elements = [
                Bodies.rectangle(-50, MAP_HEIGHT/2, 100, MAP_HEIGHT + 1000, wallOpts),
                Bodies.rectangle(MAP_WIDTH + 50, MAP_HEIGHT/2, 100, MAP_HEIGHT + 1000, wallOpts),
                Bodies.rectangle(MAP_WIDTH/2, MAP_HEIGHT + 100, MAP_WIDTH, 200, wallOpts)
            ];

            // 난잡하지 않게 벽 간격 넓힘
            for(let y = 800; y < MAP_HEIGHT - 1000; y += 900) {
                elements.push(Bodies.rectangle(50, y, 300, 40, { isStatic: true, angle: Math.PI/6, friction: 0, restitution: 0.7, label: 'wall', chamfer: {radius: 15} }));
                elements.push(Bodies.rectangle(MAP_WIDTH - 50, y + 400, 300, 40, { isStatic: true, angle: -Math.PI/6, friction: 0, restitution: 0.7, label: 'wall', chamfer: {radius: 15} }));
            }

            let currentY = 400;
            // 막대 개수 조절
            for (let i = 0; i < 4; i++) {
                let isLeft = Math.random() > 0.5;
                let width = 400 + Math.random() * 400;
                let x = (MAP_WIDTH / 2) + (isLeft ? -200 : 200) + ((Math.random() * 200) * (isLeft ? -1 : 1));
                let angle = (0.15 + Math.random() * 0.2) * (isLeft ? 1 : -1);
                elements.push(Bodies.rectangle(x, currentY, width, 40, { isStatic: true, angle: angle, friction: 0, restitution: 0.3, label: 'wall', chamfer: { radius: 20 } }));
                if (Math.random() > 0.5) mines.push(Bodies.circle(isLeft ? x + width/2 - 40 : x - width/2 + 40, currentY - 30, 20, { isStatic: true, isSensor: true, label: 'mine' }));
                currentY += 400 + Math.random() * 200; 
            }

            let seesawY = currentY + 300;
            for(let i = 0; i < 2; i++) {
                let x = MAP_WIDTH/2 + (Math.random() * 400 - 200); let width = 500;
                let seesaw = Bodies.rectangle(x, seesawY, width, 40, { friction: 0, restitution: 0.2, label: 'seesaw', chamfer: { radius: 20 }});
                elements.push(seesaw, Constraint.create({ pointA: {x: x, y: seesawY}, bodyB: seesaw, length: 0, stiffness: 0.9, render: { visible: false } }));
                elements.push(Bodies.circle(x - width/2 + 20, seesawY - 50, 15, { isStatic: true, label: 'pin' }), Bodies.circle(x + width/2 - 20, seesawY - 50, 15, { isStatic: true, label: 'pin' }));
                if (Math.random() > 0.3) luckyBoxes.push(Bodies.rectangle(x + (Math.random() * (width/2) - width/4), seesawY - 60, 50, 50, { isStatic: true, isSensor: true, label: 'lucky_box', chamfer: {radius: 8} }));
                seesawY += 500;
            }

            let sweeperY = seesawY + 300;
            while(sweeperY < MAP_HEIGHT - 3500) {
                let sweeper = Bodies.rectangle(MAP_WIDTH/2, sweeperY, 400, 40, { isStatic: true, friction: 0, restitution: 0.8, label: 'wall', chamfer: { radius: 20 } });
                elements.push(sweeper);
                sweepers.push({ body: sweeper, startX: MAP_WIDTH/2, range: 400, angle: Math.random() * Math.PI, speed: 0.04 });
                sweeperY += 600;
            }

            // 블랙홀은 1개 또는 2개로 축소
            for(let i=0; i<1; i++) {
                let bhX = MAP_WIDTH/2 + (Math.random() * 400 - 200); let bhY = MAP_HEIGHT - 2800; let radius = 500;
                elements.push(Bodies.circle(bhX, bhY, radius, { isStatic: true, isSensor: true, label: 'blackhole_sensor' }), Bodies.circle(bhX, bhY, radius * 0.1, { isStatic: true, restitution: 0.8, friction: 0, label: 'blackhole_core' }));
                blackholes.push({ x: bhX, y: bhY, radius: radius, power: 0.005, rotation: 0 });
            }

            gravitySwitch = Bodies.rectangle(MAP_WIDTH/2, MAP_HEIGHT - 1800, MAP_WIDTH, 60, { isStatic: true, isSensor: true, label: 'gravity_switch' });
            elements.push(gravitySwitch);

            // 핀 필드 구간
            for (let y = MAP_HEIGHT - 1600; y < MAP_HEIGHT - 800; y += 200) {
                for (let x = 100; x < MAP_WIDTH - 50; x += 220 + Math.random() * 60) {
                    elements.push(Bodies.circle(x + Math.random() * 80, y, 18, { isStatic: true, restitution: 0.6, label: 'pin' }));
                }
            }

            for (let i = 1; i < 10; i++) {
                elements.push(Bodies.rectangle(i * (MAP_WIDTH / 10), MAP_HEIGHT - 300, 20, 600, { isStatic: true, restitution: 0.5, label: 'wall' }));
            }

            Composite.add(world, [...elements, ...mines, ...luckyBoxes]);
        }

        function startRace() {
            if(playersData.length === 0) return alert("참가자를 최소 1명 이상 추가해주세요!");
            if(marbles.length > 0) buildMap();
            
            document.getElementById('ui-panel').style.transform = 'translateY(-150%) scale(0.9)';
            document.getElementById('ui-panel').style.opacity = '0';
            document.getElementById('leaderboard').style.display = 'block';

            playersData.forEach((name, i) => {
                const marble = Bodies.circle((MAP_WIDTH / 2) + (Math.random() * 400 - 200), -200 - (i * 120), 24, { 
                    restitution: 0.55, friction: 0.001, frictionAir: 0.012, density: 0.08, 
                    label: 'marble',
                    plugin: { name: name, color: colors[i % colors.length], trail: [], finished: false, stopped: false, rank: 0, currentRank: 0, stuckTimer: 0, effect: 'none', effectTimer: 0 }
                });
                Body.setVelocity(marble, { x: (Math.random() - 0.5) * 10, y: 5 });
                marbles.push(marble);
                Composite.add(world, marble);
            });
        }

        function triggerMine(mineBody, marble) { Body.setPosition(mineBody, { x: -1000, y: -1000 }); createParticles(mineBody.position.x, mineBody.position.y, '#ff0055', 40); marbles.forEach(m => { if(!m.plugin.finished) Body.applyForce(m, m.position, {x:(m.position.x-mineBody.position.x)*0.002, y:(m.position.y-mineBody.position.y)*0.002 - 0.1}); }); }
        function triggerLuckyBox(boxBody, marble) { Body.setPosition(boxBody, { x: -1000, y: -1000 }); const effect = ['giant', 'mini', 'freeze'][Math.floor(Math.random() * 3)]; marble.plugin.effect = effect; if(effect === 'giant') { marble.plugin.effectTimer=300; Body.scale(marble, 2.5, 2.5); } else if(effect==='mini') { marble.plugin.effectTimer=300; Body.scale(marble, 0.5, 0.5); } else { marble.plugin.effectTimer=100; marble.plugin.savedVelocity={...marble.velocity}; Body.setStatic(marble, true); } }
        function triggerGravitySwitch() { if(isGravityReversed) return; isGravityReversed=true; gravityTimer=GRAVITY_DURATION; world.gravity.y=-BASE_GRAVITY; document.getElementById('gravity-warning').style.display='block'; }

        // --- 3. 가볍고 통쾌한 폭발 연출 추가 ---
        function showResultScreen() {
            const numLosers = parseInt(document.getElementById('penalty-slider').value);
            const losersList = document.getElementById('losers-list');
            losersList.innerHTML = '';
            
            const losers = finishedMarbles.slice(-numLosers);
            
            // 시각적 폭발 효과 (가벼운 파티클 처리)
            losers.forEach(loser => {
                // 파티클 크게 생성
                createParticles(loser.position.x, loser.position.y, '#ff0055', 80, 25);
                // 구슬 치우기 (화면 밖으로)
                Body.setPosition(loser, {x: -2000, y: -2000});
            });

            losers.reverse().forEach(loser => { 
                losersList.innerHTML += `<div class="loser-name">${loser.plugin.name} <span class="text-sm font-normal text-white opacity-70">(${loser.plugin.rank}등)</span></div>`;
            });
            document.getElementById('result-modal').style.display = 'flex';
        }

        function closeResult() {
            document.getElementById('result-modal').style.display = 'none';
            buildMap();
            document.getElementById('ui-panel').style.transform = 'translateY(0) scale(1)';
            document.getElementById('ui-panel').style.opacity = '1';
        }

        function updateLogic() {
            sweepers.forEach(s => { s.angle += s.speed; Body.setPosition(s.body, { x: s.startX + Math.sin(s.angle) * s.range, y: s.body.position.y }); });
            blackholes.forEach(bh => { bh.rotation += 0.08; marbles.forEach(m => { if(m.plugin.finished) return; let dx=bh.x-m.position.x, dy=bh.y-m.position.y, distSq=dx*dx+dy*dy; if(distSq < bh.radius*bh.radius) { let dist=Math.sqrt(distSq); if(dist>15) Body.applyForce(m, m.position, {x:(dx/dist*1.5 + dy/dist*0.8)*bh.power*m.mass*(1-dist/bh.radius), y:(dy/dist*1.5 - dx/dist*0.8)*bh.power*m.mass}); } }); });

            if (isGravityReversed) { gravityTimer--; if (gravityTimer<=0) { isGravityReversed=false; world.gravity.y=BASE_GRAVITY; document.getElementById('gravity-warning').style.display='none'; } else document.getElementById('gravity-warning').style.opacity = gravityTimer%10<5?1:0.5; }

            marbles.forEach(m => {
                if (m.plugin.finished) return;
                if (m.plugin.effect!=='freeze' && Math.abs(m.velocity.y)<0.5) m.plugin.stuckTimer++; else m.plugin.stuckTimer=0;
                if (m.plugin.stuckTimer>40) { Body.applyForce(m, m.position, {x:(Math.random()-0.5)*0.2*m.mass, y:(isGravityReversed?0.25:-0.25)*m.mass}); m.plugin.stuckTimer=0; }
                if (m.plugin.effect!=='none') { m.plugin.effectTimer--; if(m.plugin.effectTimer<=0) { if(m.plugin.effect==='giant') Body.scale(m, 1/2.5, 1/2.5); else if(m.plugin.effect==='mini') Body.scale(m, 2, 2); else Body.setStatic(m, false); m.plugin.effect='none'; } }
            });
        }

        function handleActiveCollisions(event) {
            event.pairs.forEach(pair => {
                let m = pair.bodyA.label==='marble'?pair.bodyA:(pair.bodyB.label==='marble'?pair.bodyB:null);
                let s = pair.bodyA.isSensor?pair.bodyA:(pair.bodyB.isSensor?pair.bodyB:null);
                if(m && s) { if(s.label==='mine') triggerMine(s, m); else if(s.label==='lucky_box'&&m.plugin.effect==='none') triggerLuckyBox(s, m); else if(s.label==='gravity_switch') triggerGravitySwitch(); }
            });
        }

        function createParticles(x, y, color, count, speed=15) { for(let i=0; i<count; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed, life: 1.0, color: color }); }

        function render() {
            frameCounter++;
            
            let bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, isGravityReversed ? '#200000' : '#04040a');
            bgGradient.addColorStop(1, isGravityReversed ? '#400000' : '#0a0a18');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let leaderY = 0; marbles.forEach(m => { if (!m.plugin.finished && m.position.y > leaderY) leaderY = m.position.y; });
            if (leaderY === 0 && finishedMarbles.length > 0) leaderY = MAP_HEIGHT; 
            let viewHeightInWorld = canvas.height / cameraZoom;
            let targetCameraY = Math.max(cameraY, leaderY - (viewHeightInWorld * 0.6)); 
            if (targetCameraY > MAP_HEIGHT - viewHeightInWorld + 200) targetCameraY = MAP_HEIGHT - viewHeightInWorld + 200;
            cameraY += (targetCameraY - cameraY) * 0.05; 

            ctx.strokeStyle = 'rgba(0, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            let gridY = (cameraY * cameraZoom) % 80;
            for(let i = 0; i < canvas.height + 80; i += 80) { ctx.beginPath(); ctx.moveTo(0, i - gridY); ctx.lineTo(canvas.width, i - gridY); ctx.stroke(); }
            for(let i = 0; i < canvas.width; i += 80) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }

            const viewTop = cameraY - 200, viewBottom = cameraY + viewHeightInWorld + 200;

            ctx.save();
            ctx.translate(canvas.width / 2, 0); ctx.scale(cameraZoom, cameraZoom); ctx.translate(-MAP_WIDTH / 2, -cameraY);

            ctx.fillStyle = 'rgba(0, 220, 255, 0.1)'; ctx.strokeStyle = 'rgba(0, 220, 255, 0.5)'; ctx.lineWidth = 2;
            ctx.beginPath();
            world.bodies.forEach(b => {
                if(b.bounds.max.y < viewTop || b.bounds.min.y > viewBottom || b.label==='marble' || b.isSensor || b.label==='pin') return;
                b.parts.forEach((p, i) => { if(i===0 && b.parts.length>1) return; ctx.moveTo(p.vertices[0].x, p.vertices[0].y); for(let j=1;j<p.vertices.length;j++) ctx.lineTo(p.vertices[j].x, p.vertices[j].y); ctx.lineTo(p.vertices[0].x, p.vertices[0].y); });
            });
            ctx.fill(); ctx.stroke();

            ctx.fillStyle = 'rgba(255, 255, 0, 0.4)'; ctx.beginPath();
            world.bodies.forEach(b => { if(b.label==='pin' && b.position.y > viewTop && b.position.y < viewBottom) { ctx.moveTo(b.position.x+b.circleRadius, b.position.y); ctx.arc(b.position.x, b.position.y, b.circleRadius, 0, 2*Math.PI); }});
            ctx.fill();

            world.bodies.forEach(b => {
                if(b.bounds.max.y < viewTop || b.bounds.min.y > viewBottom) return;
                if(b.label==='lucky_box') { ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(b.bounds.min.x, b.bounds.min.y, 50, 50); ctx.fillRect(b.bounds.min.x, b.bounds.min.y, 50, 50); ctx.fillStyle='#fff'; ctx.font='bold 24px Arial'; ctx.textAlign='center'; ctx.fillText('?', b.position.x, b.position.y+8); }
                else if(b.label==='mine') { ctx.fillStyle='rgba(255,0,0,0.3)'; ctx.strokeStyle='#ff0000'; ctx.beginPath(); ctx.arc(b.position.x, b.position.y, b.circleRadius, 0, 2*Math.PI); ctx.fill(); ctx.stroke(); ctx.fillStyle='#fff'; ctx.font='bold 16px Arial'; ctx.fillText('❌', b.position.x, b.position.y+6); }
                else if(b.label==='gravity_switch') { ctx.fillStyle='rgba(255,0,85,0.2)'; ctx.fillRect(b.bounds.min.x, b.bounds.min.y, MAP_WIDTH, 60); ctx.fillStyle='#ff0055'; ctx.font='bold 30px "Malgun Gothic"'; ctx.fillText('⚠️ GRAVITY SWITCH ⚠️', MAP_WIDTH/2, b.position.y+10); }
            });

            if (FINISH_LINE > viewTop && FINISH_LINE < viewBottom) {
                ctx.beginPath(); ctx.moveTo(0, FINISH_LINE); ctx.lineTo(MAP_WIDTH, FINISH_LINE); ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 6; ctx.setLineDash([20, 15]); ctx.stroke(); ctx.setLineDash([]);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                if (p.y >= viewTop - 500 && p.y <= viewBottom + 500) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill(); }
            }
            ctx.globalAlpha = 1.0;

            if (frameCounter % 15 === 0) updateLeaderboard();

            marbles.forEach(m => {
                let p = m.plugin;
                if (!p.finished && m.position.y > FINISH_LINE) {
                    p.finished = true; p.rank = finishedMarbles.length + 1; finishedMarbles.push(m);
                    setTimeout(() => { p.stopped = true; Body.setStatic(m, true); }, 1500); 
                    createParticles(m.position.x, m.position.y, p.color, 40);
                    if(finishedMarbles.length === marbles.length) setTimeout(showResultScreen, 1500);
                }

                if (p.effect !== 'freeze' && !p.stopped) { p.trail.push({x: m.position.x, y: m.position.y}); if (p.trail.length > 15) p.trail.shift(); }

                if (p.trail.length > 1 && m.position.y >= viewTop && m.position.y <= viewBottom) {
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = m.circleRadius * 1.5; ctx.strokeStyle = p.color;
                    ctx.beginPath(); ctx.moveTo(p.trail[0].x, p.trail[0].y); for (let i=1; i<p.trail.length; i++) ctx.lineTo(p.trail[i].x, p.trail[i].y);
                    ctx.globalAlpha = 0.25; ctx.stroke(); ctx.globalAlpha = 1.0;
                }

                if (m.position.y >= viewTop && m.position.y <= viewBottom) {
                    ctx.beginPath(); ctx.arc(m.position.x, m.position.y, m.circleRadius + 5, 0, 2*Math.PI);
                    ctx.fillStyle = p.color; ctx.globalAlpha = 0.3; ctx.fill(); ctx.globalAlpha = 1.0;

                    ctx.beginPath(); ctx.arc(m.position.x, m.position.y, m.circleRadius, 0, 2*Math.PI);
                    ctx.fillStyle = p.effect==='freeze' ? '#ccffff' : '#fff'; ctx.fill();
                    ctx.strokeStyle = p.color; ctx.lineWidth = 4; ctx.stroke(); 

                    let fontSize = p.effect==='giant'?28:(p.effect==='mini'?14:20);
                    ctx.font = `bold ${fontSize}px "Pretendard", sans-serif`;
                    const badgeWidth = ctx.measureText(p.name).width + 16;
                    const badgeY = m.position.y - m.circleRadius - (p.effect==='giant'?40:25);

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)'; ctx.beginPath(); ctx.roundRect(m.position.x - badgeWidth/2, badgeY, badgeWidth, fontSize+10, 8); ctx.fill(); 
                    ctx.strokeStyle = p.color; ctx.lineWidth = 1.5; ctx.stroke();

                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(p.name, m.position.x, badgeY + (fontSize+10)/2);
                    
                    if (p.finished) {
                        ctx.font = '900 32px "Pretendard"';
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(m.position.x - 35, m.position.y - m.circleRadius - 90, 70, 40);
                        ctx.fillStyle = 'gold'; ctx.fillText(p.rank+'등', m.position.x, m.position.y - m.circleRadius - 70);
                    }
                }
            });

            ctx.restore();
            requestAnimationFrame(render);
        }

        function updateLeaderboard() {
            if(marbles.length === 0) return;
            let sorted = [...marbles].sort((a, b) => {
                if (a.plugin.finished && b.plugin.finished) return a.plugin.rank - b.plugin.rank;
                if (a.plugin.finished) return -1; if (b.plugin.finished) return 1; return b.position.y - a.position.y;
            });

            document.getElementById('rank-list').innerHTML = sorted.map((m, idx) => {
                m.plugin.currentRank = idx + 1;
                let css = 'rank-item' + (idx<3 ? ` rank-${idx+1}` : '');
                let status = m.plugin.finished ? '🏁 도착' : Math.floor((m.position.y / FINISH_LINE) * 100) + '%';
                return `<div class="${css}">
                            <div class="flex items-center gap-2">
                                <span class="w-5 text-center text-white">${idx+1}</span>
                                <span class="w-3 h-3 rounded-full" style="background-color:${m.plugin.color}; box-shadow: 0 0 5px ${m.plugin.color}"></span>
                                <span class="text-white">${m.plugin.name}</span>
                            </div>
                            <span class="text-xs text-gray-400">${status}</span>
                         </div>`;
            }).join('');
        }

        document.getElementById('start-btn').addEventListener('click', startRace);
        document.getElementById('reset-btn').addEventListener('click', () => { buildMap(); document.getElementById('ui-panel').style.transform = 'translateY(0) scale(1)'; document.getElementById('ui-panel').style.opacity = '1'; document.getElementById('leaderboard').style.display = 'none'; });

        init();
    </script>
</body>
</html>
