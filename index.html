<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 냥이 밥 먹기 대회</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@600;800&display=swap');

:root {
  --bg:        #FFFBF0;
  --panel:     #FFFFFF;
  --card:      #FFFFFF;
  --accent:    #FF8FAB;
  --yellow:    #FFD166;
  --green:     #06D6A0;
  --cyan:      #48CAE4;
  --text:      #5C4D4D;
  --muted:     #9E9494;
  --cute-font: 'Jua', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--cute-font);
  min-height: 100vh;
  overflow-x: hidden;
  background-image: 
    radial-gradient(#FFD166 2px, transparent 2px),
    radial-gradient(#FF8FAB 2px, transparent 2px);
  background-size: 60px 60px;
  background-position: 0 0, 30px 30px;
  background-attachment: fixed;
  opacity: 0.95;
}

/* ── 타이틀 화면 ── */
#title-screen {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px;
}

.cute-title {
  font-size: clamp(2rem, 5vw, 3.5rem);
  color: #FF6B8B;
  text-shadow: 3px 3px 0px #FFF, 5px 5px 0px #FFD166;
  text-align: center;
  margin-bottom: 10px;
  animation: bounceTitle 2s ease-in-out infinite;
}
.cute-subtitle {
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: #48CAE4;
  text-align: center;
  margin-bottom: 40px;
  background: #FFF;
  padding: 8px 20px;
  border-radius: 30px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

@keyframes bounceTitle {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ── 입력 패널 ── */
.setup-panel {
  background: var(--panel);
  border: 4px solid #FFB3C6;
  border-radius: 25px;
  padding: 35px;
  width: min(500px, 92vw);
  box-shadow: 0 15px 30px rgba(255, 143, 171, 0.15);
  position: relative;
}

.setup-label {
  font-size: 1.2rem;
  color: var(--text);
  display: block;
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  background: #FFF5F7;
  border: 2px solid #FFD166;
  color: var(--text);
  font-family: 'Nunito', 'Jua', sans-serif;
  font-size: 1.1rem;
  padding: 16px;
  border-radius: 15px;
  resize: none;
  height: 120px;
  transition: all 0.3s ease;
  outline: none;
}
textarea:focus { 
  border-color: var(--accent); 
  background: #FFF;
  box-shadow: 0 0 10px rgba(255, 143, 171, 0.2);
}
textarea::placeholder { color: #C4B5B5; }

.btn-cute {
  font-family: var(--cute-font);
  font-size: 1.3rem;
  background: linear-gradient(135deg, #FF9EBB, #FF6B8B);
  color: #fff;
  border: none;
  padding: 16px 32px;
  border-radius: 30px;
  cursor: pointer;
  display: block;
  width: 100%;
  margin-top: 20px;
  box-shadow: 0 8px 20px rgba(255, 107, 139, 0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-cute:hover  { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255, 107, 139, 0.4); }
.btn-cute:active { transform: translateY(2px);  box-shadow: 0 4px 10px rgba(255, 107, 139, 0.3); }

/* ── 게임 화면 ── */
#game-screen {
  display: none;
  position: relative; z-index: 1;
  padding: 30px 20px;
  min-height: 100vh;
}

.game-header {
  text-align: center;
  margin-bottom: 30px;
  background: rgba(255, 255, 255, 0.9);
  padding: 20px;
  border-radius: 20px;
  display: inline-block;
  left: 50%;
  position: relative;
  transform: translateX(-50%);
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}
.game-title {
  font-size: clamp(1.5rem, 3vw, 2rem);
  color: #FF6B8B;
  margin-bottom: 5px;
}
.game-subtitle {
  font-size: 1.1rem;
  color: var(--muted);
}

/* ── 동물 그리드 ── */
#animal-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  max-width: 1200px;
  margin: 0 auto 40px;
}

/* ── 동물 카드 ── */
.animal-card {
  background: var(--card);
  border: 3px solid #F0E6E6;
  border-radius: 25px;
  width: 190px;
  padding: 20px 15px;
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  gap: 12px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.04);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.animal-card.finished  { border-color: #06D6A0; transform: scale(0.95); opacity: 0.8; }
.animal-card.winner    { border-color: #FF6B8B!important; transform: scale(1.05); box-shadow: 0 10px 30px rgba(255, 107, 139, 0.3)!important; z-index: 2;}
.animal-card.distracted{ border-color: var(--yellow); box-shadow: 0 10px 20px rgba(255, 209, 102, 0.3); }

/* ── 순위 뱃지 ── */
.rank-badge {
  position: absolute;
  top: -12px; right: -12px;
  font-size: 1.1rem;
  padding: 8px 12px;
  border-radius: 20px;
  z-index: 5;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
}
.rank-badge.rank-1 { background: #FFD700; color: #FFF; }
.rank-badge.rank-2 { background: #E0E0E0; color: #666; }
.rank-badge.rank-3 { background: #CD7F32; color: #FFF; }
.rank-badge.rank-other { background: #F0E6E6; color: var(--muted); }

/* ── 성격 뱃지 ── */
.trait-badge {
  font-size: 0.9rem;
  color: #FFF;
  background: var(--cyan);
  border-radius: 12px;
  padding: 4px 10px;
  text-align: center;
  white-space: nowrap;
}

/* ── 동물 이름 ── */
.animal-name {
  font-size: 1.4rem;
  color: var(--text);
  text-align: center;
  word-break: break-all;
}

/* ── SVG 동물 컨테이너 ── */
.animal-svg-wrap {
  width: 110px; height: 110px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── 상태 텍스트 ── */
.animal-state-label {
  font-size: 1.1rem;
  color: #FF9EBB;
  text-align: center;
  min-height: 1.5em;
  font-weight: bold;
}

/* ── 밥그릇 바 ── */
.bowl-wrap { width: 100%; }
.bowl-label {
  font-size: 1rem;
  color: var(--muted);
  margin-bottom: 6px;
  display: flex; justify-content: space-between;
}
.bowl-track {
  width: 100%; height: 18px;
  background: #F0E6E6;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
}
.bowl-bar {
  height: 100%;
  background: linear-gradient(90deg, #FFD166, #FF9EBB);
  border-radius: 10px;
  transition: width 0.1s linear;
}

/* ── 밥알 파티클 ── */
.food-particle {
  position: fixed;
  font-size: 14px;
  pointer-events: none;
  z-index: 100;
  animation: foodFly 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}
@keyframes foodFly {
  0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.5) rotate(180deg); }
}

/* ── 딴짓 오버레이 ── */
.distract-overlay {
  position: absolute; inset: 0;
  background: rgba(255, 255, 255, 0.6);
  border-radius: 25px;
  display: none;
  align-items: center; justify-content: center;
  z-index: 4;
  backdrop-filter: blur(2px);
}
.animal-card.distracted .distract-overlay { display: flex; }
.distract-msg {
  font-size: 1.3rem;
  color: #FFF;
  text-align: center;
  background: #FFD166;
  padding: 8px 16px;
  border-radius: 20px;
  box-shadow: 0 4px 10px rgba(255, 209, 102, 0.4);
  transform: rotate(-5deg);
  animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn {
  0% { transform: scale(0) rotate(-20deg); }
  100% { transform: scale(1) rotate(-5deg); }
}

/* ── 결과 화면 ── */
#result-screen {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(255, 251, 240, 0.95);
  align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  padding: 20px;
}
.result-box {
  background: var(--panel);
  border: 5px solid #FF8FAB;
  border-radius: 30px;
  padding: 40px 30px;
  width: min(800px, 98vw); 
  text-align: center;
  box-shadow: 0 20px 50px rgba(255, 143, 171, 0.2);
  animation: resultPop 0.6s cubic-bezier(0.2,0.8,0.2,1);
  display: flex;
  flex-direction: column;
}
@keyframes resultPop {
  from { transform: scale(0.8) translateY(40px); opacity: 0; }
  to   { transform: scale(1) translateY(0);      opacity: 1; }
}
.result-title {
  font-size: 2.5rem;
  color: #FF6B8B;
  margin-bottom: 5px;
}
.result-desc {
  font-size: 1.2rem;
  color: var(--text);
  margin-bottom: 20px;
}

/* 두 개의 박스를 감싸는 컨테이너 */
.result-columns {
  display: flex;
  gap: 20px;
  margin-bottom: 25px;
  justify-content: center;
}
.result-col {
  flex: 1;
  background: #FFF9FA;
  border: 3px solid #F0E6E6;
  border-radius: 20px;
  padding: 20px;
  min-width: 250px;
}
.result-col.penalty-col {
  background: #FFF5F7;
  border-color: #FFB3C6;
}

.col-title {
  font-size: 1.6rem;
  color: #48CAE4;
  margin-bottom: 15px;
  font-weight: bold;
}
.penalty-col .col-title {
  color: #FF6B8B;
}

/* 리스트 스크롤 스타일 */
.result-list-wrap {
  max-height: 40vh;
  overflow-y: auto;
  padding-right: 8px;
}
.result-list-wrap::-webkit-scrollbar { width: 8px; }
.result-list-wrap::-webkit-scrollbar-track { background: transparent; }
.result-list-wrap::-webkit-scrollbar-thumb { background: #FFB3C6; border-radius: 4px; }

.result-row {
  background: #FFFFFF;
  border-radius: 15px;
  padding: 10px 15px;
  margin: 10px 0;
  display: flex; align-items: center; gap: 12px;
  animation: slideIn 0.3s ease both;
  box-shadow: 0 4px 8px rgba(0,0,0,0.03);
}
.penalty-col .result-row {
  border: 2px dashed #FFB3C6;
  background: #FFF;
}

@keyframes slideIn {
  from { transform: translateX(-20px); opacity: 0; }
  to   { transform: translateX(0);     opacity: 1; }
}

.row-rank {
  font-size: 1.4rem;
  font-weight: bold;
  width: 45px;
  text-align: center;
  color: #48CAE4;
}
.penalty-col .row-rank { color: #6F4E37; font-size: 1.6rem; }

.row-name { 
  font-size: 1.3rem; 
  color: var(--text); 
  flex: 1; 
  text-align: left; 
}

.row-trait { 
  font-size: 0.95rem; 
  color: var(--muted); 
}

@media (max-width: 650px) {
  .result-columns { flex-direction: column; }
  .result-list-wrap { max-height: 25vh; }
}

@media (max-width: 480px) {
  .animal-card { width: 160px; padding: 15px 10px; }
  .setup-panel { padding: 25px 20px; }
  .cute-title { font-size: 2rem; }
  .result-box { padding: 30px 20px; }
  .row-name { font-size: 1.2rem; }
}
</style>
</head>
<body>

<div id="title-screen">
  <div class="cute-title">🐱 냥이 밥먹기 대회 🍚</div>
  <div class="cute-subtitle">꼴찌 당첨자는 누구?</div>

  <div class="setup-panel">
    <label class="setup-label" for="animal-input">
      🐾 참가자 이름 입력 <span style="color:#C4B5B5; font-size:0.9rem;">(쉼표 또는 줄바꿈 구분)</span>
    </label>
    <textarea id="animal-input" placeholder="예: 인절미, 찹쌀떡, 모찌, 장수익, 박예지"></textarea>
    <button class="btn-cute" id="start-btn">경기 시작하기 🚀</button>
  </div>
</div>

<div id="game-screen">
  <div class="game-header">
    <div class="game-title">🍚 대회 진행중... 뇸뇸뇸</div>
    <div class="game-subtitle" id="game-info">-- 마리 참가 • 하위 -- 마리 벌칙</div>
  </div>
  <div id="animal-grid"></div>
</div>

<div id="result-screen">
  <div class="result-box">
    <div class="result-title">🎉 GAME OVER 🎉</div>
    <div class="result-desc" id="result-desc">결과를 확인하세요!</div>

    <div class="result-columns">
      <div class="result-col">
        <div class="col-title">🏆 전체 순위</div>
        <div class="result-list-wrap" id="result-list-all"></div>
      </div>
      <div class="result-col penalty-col">
        <div class="col-title">☕ 벌칙 당첨자</div>
        <div class="result-list-wrap" id="result-list-penalty"></div>
      </div>
    </div>

    <button class="btn-cute" id="retry-btn" style="background: linear-gradient(135deg, #48CAE4, #00B4D8); width: auto; min-width: 200px; align-self: center;">
      🔄 다시 하기
    </button>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const savedNames = localStorage.getItem('cuteAnimalNames');
  if (savedNames) {
    document.getElementById('animal-input').value = savedNames;
  }
});

// 동물별 색상 팔레트 정의 (어울리는 색으로 세트 구성)
const ANIMAL_PALETTES = {
  cat: {
    orange: { body: '#FCA311', belly: '#FFE5B4', ear: '#E85D04', stroke: '#D68C00' },
    gray:   { body: '#A0AAB2', belly: '#E2E8F0', ear: '#64748B', stroke: '#8795A1' },
    black:  { body: '#2B2D42', belly: '#8D99AE', ear: '#1A1B28', stroke: '#1D1E2C' },
    white:  { body: '#FFFFFF', belly: '#FFF5F7', ear: '#FFB3C6', stroke: '#E2E8F0' },
    calico: { body: '#FFF0D4', belly: '#FFFFFF', ear: '#FCA311', stroke: '#E5D8BF', spots: true },
    brown:  { body: '#9C6644', belly: '#E6CCB2', ear: '#7F4F24', stroke: '#855537' }
  },
  dog: {
    // 강아지에게 어울리는 파스텔 톤 골든 세트
    golden: { body: '#F3D17A', belly: '#FFF7E6', ear: '#D4A757', stroke: '#C29548' },
  },
  hamster: {
    // 햄스터에게 어울리는 크림파스텔 세트
    cream:  { body: '#E8CFC0', belly: '#FFFFFF', ear: '#FFB3C6', stroke: '#B89A89' },
  }
};
const CAT_COLOR_KEYS = Object.keys(ANIMAL_PALETTES.cat);

// 통합 동물 SVG 렌더링 함수 (나중에 토끼, 햄스터 등 추가 시 switch 문에 케이스 추가)
function getAnimalSVG(animalType, colorKey, pose, bobPhase = 0) {
  const isSleep = pose === 'sleep';
  const isEat = pose === 'eat';
  const isGroom = pose === 'groom';

  // 스윙 폭 (공통)
  const bob = Math.sin(bobPhase) * 6; 
  const headY = isEat ? 12 + bob : (isSleep ? 18 : 0);
  const headX = pose === 'idle' ? Math.sin(bobPhase)*2 : 0;

  // 공통 눈
  const eyes = isSleep || isEat
    ? `<path d="M30,55 Q35,60 40,55" stroke="#4A4E69" stroke-width="3" fill="none" stroke-linecap="round"/>
       <path d="M60,55 Q65,60 70,55" stroke="#4A4E69" stroke-width="3" fill="none" stroke-linecap="round"/>`
    : `<circle cx="35" cy="55" r="4.5" fill="#4A4E69"/>
       <circle cx="65" cy="55" r="4.5" fill="#4A4E69"/>`;

  // 동물 종류별 SVG 가져오기
  let animalSVG = '';
  switch(animalType) {
    case 'dog':
      animalSVG = getDogSVG(colorKey, pose, bobPhase, bob, headX, headY, eyes);
      break;
    case 'hamster':
      animalSVG = getHamsterSVG(colorKey, pose, bobPhase, bob, headX, headY, eyes);
      break;
    default: // cat
      animalSVG = getCatSVG(colorKey, pose, bobPhase, bob, headX, headY, eyes);
  }
  return animalSVG;
}

function getCatSVG(colorKey, pose, bobPhase, bob, headX, headY, eyes) {
  const c = ANIMAL_PALETTES.cat[colorKey] || ANIMAL_PALETTES.cat.orange;
  const isEat = pose === 'eat';
  const isGroom = pose === 'groom';
  
  const tail = `<path d="M 80,85 Q 95,85 95,65 Q 95,50 85,60" fill="none" stroke="${c.body}" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>`;
  
  const ears = `
    <polygon points="20,45 25,18 45,35" fill="${c.body}" stroke="${c.stroke}" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="25,40 28,25 40,35" fill="${c.ear}"/>
    <polygon points="80,45 75,18 55,35" fill="${c.body}" stroke="${c.stroke}" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="75,40 72,25 60,35" fill="${c.ear}"/>
  `;
  
  const faceDetails = `
    <ellipse cx="50" cy="62" rx="18" ry="12" fill="${c.belly}"/>
    <polygon points="47,60 53,60 50,63" fill="#FF8FAB"/>
    ${isEat 
      ? `<ellipse cx="50" cy="65" rx="5" ry="7" fill="#FF8FAB"/>` 
      : `<path d="M45,64 Q50,68 55,64" stroke="#4A4E69" stroke-width="2.5" fill="none" stroke-linecap="round"/>`}
    <path d="M 10,55 L 25,58 M 8,62 L 25,62 M 90,55 L 75,58 M 92,62 L 75,62" stroke="#A0AAB2" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  `;
  
  const paws = isGroom
    ? `<ellipse cx="35" cy="85" rx="10" ry="8" fill="${c.body}" stroke="${c.stroke}" stroke-width="2"/>
       <ellipse cx="60" cy="55" rx="10" ry="14" fill="${c.body}" stroke="${c.stroke}" stroke-width="2" transform="rotate(-30 60 55)"/>`
    : `<ellipse cx="35" cy="88" rx="11" ry="7" fill="${c.body}" stroke="${c.stroke}" stroke-width="2"/>
       <ellipse cx="65" cy="88" rx="11" ry="7" fill="${c.body}" stroke="${c.stroke}" stroke-width="2"/>`;

  const spots = c.spots ? `<path d="M 20,40 Q 40,30 30,60 Z" fill="#2B2D42"/><path d="M 70,35 Q 90,45 80,65 Z" fill="#FCA311"/>` : '';

  return `
    <svg viewBox="0 0 100 100" width="100%" height="100%">
      ${tail}
      <path d="M 20,90 C 15,55 85,55 80,90 Z" fill="${c.body}" stroke="${c.stroke}" stroke-width="3"/>
      <path d="M 35,90 C 35,70 65,70 65,90 Z" fill="${c.belly}"/>
      <g transform="translate(${headX}, ${headY})">
        ${ears}
        <ellipse cx="50" cy="55" rx="38" ry="28" fill="${c.body}" stroke="${c.stroke}" stroke-width="3"/>
        ${spots}
        ${faceDetails}
        ${eyes}
      </g>
      ${paws}
    </svg>
  `;
}

function getDogSVG(colorKey, pose, bobPhase, bob, headX, headY, eyes) {
  const c = ANIMAL_PALETTES.dog.golden; // 강아지는 전용 색상 고정
  const isEat = pose === 'eat';
  const isGroom = pose === 'groom';
  
  // 살랑거리는 꼬리
  const wag = isEat ? Math.sin(bobPhase * 2) * 10 : 0;
  const tail = `<path d="M 80,85 Q 100,${85 + wag} 90,${70 + wag}" fill="none" stroke="${c.body}" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>`;
  
  // 축 처진 귀
  const ears = `
    <ellipse cx="22" cy="45" rx="10" ry="20" fill="${c.body}" stroke="${c.stroke}" stroke-width="2" transform="rotate(25 22 45)"/>
    <ellipse cx="78" cy="45" rx="10" ry="20" fill="${c.body}" stroke="${c.stroke}" stroke-width="2" transform="rotate(-25 78 45)"/>
  `;
  
  // 큰 코와 입
  const faceDetails = `
    <ellipse cx="50" cy="64" rx="22" ry="16" fill="${c.belly}"/>
    <ellipse cx="50" cy="56" rx="8" ry="6" fill="#2B2D42"/>
    ${isEat 
      ? `<ellipse cx="50" cy="68" rx="6" ry="8" fill="#FF8FAB"/>` 
      : `<path d="M50,62 L50,68 Q45,72 40,68 M50,68 Q55,72 60,68" stroke="#4A4E69" stroke-width="2.5" fill="none" stroke-linecap="round"/>`}
  `;

  // 앞발
  const paws = isGroom
    ? `<ellipse cx="35" cy="85" rx="10" ry="8" fill="${c.body}" stroke="${c.stroke}" stroke-width="2"/>
       <ellipse cx="60" cy="55" rx="10" ry="14" fill="${c.body}" stroke="${c.stroke}" stroke-width="2" transform="rotate(-30 60 55)"/>`
    : `<ellipse cx="35" cy="88" rx="11" ry="7" fill="${c.body}" stroke="${c.stroke}" stroke-width="2"/>
       <ellipse cx="65" cy="88" rx="11" ry="7" fill="${c.body}" stroke="${c.stroke}" stroke-width="2"/>`;

  return `
    <svg viewBox="0 0 100 100" width="100%" height="100%">
      ${tail}
      <path d="M 20,90 C 15,55 85,55 80,90 Z" fill="${c.body}" stroke="${c.stroke}" stroke-width="3"/>
      <path d="M 35,90 C 35,70 65,70 65,90 Z" fill="${c.belly}"/>
      <g transform="translate(${headX}, ${headY})">
        ${ears}
        <ellipse cx="50" cy="55" rx="38" ry="28" fill="${c.body}" stroke="${c.stroke}" stroke-width="3"/>
        ${faceDetails}
        ${eyes}
      </g>
      ${paws}
    </svg>
  `;
}

function getHamsterSVG(colorKey, pose, bobPhase, bob, headX, headY, eyes) {
  const c = ANIMAL_PALETTES.hamster.cream; // 햄스터는 전용 색상 고정
  const isEat = pose === 'eat';
  const isGroom = pose === 'groom';
  
  // 작은 꼬리
  const tail = `<circle cx="80" cy="85" r="5" fill="${c.body}"/>`;
  
  // 동그랗고 작은 귀
  const ears = `
    <circle cx="25" cy="35" r="10" fill="${c.body}" stroke="${c.stroke}" stroke-width="2"/>
    <circle cx="25" cy="35" r="6" fill="${c.ear}"/>
    <circle cx="75" cy="35" r="10" fill="${c.body}" stroke="${c.stroke}" stroke-width="2"/>
    <circle cx="75" cy="35" r="6" fill="${c.ear}"/>
  `;
  
  // 통통한 볼과 작은 앞니
  const faceDetails = `
    <ellipse cx="50" cy="62" rx="20" ry="14" fill="${c.belly}"/>
    <polygon points="48,64 52,64 50,67" fill="#2B2D42"/>
    ${isEat 
      ? `<ellipse cx="50" cy="68" rx="7" ry="9" fill="#FF8FAB"/>` 
      : `<path d="M48,70 L48,76 M52,70 L52,76" stroke="#4A4E69" stroke-width="2.5" fill="none" stroke-linecap="round"/>
         <path d="M45,69 Q50,73 55,69" stroke="#4A4E69" stroke-width="2.5" fill="none" stroke-linecap="round"/>`}
  `;

  // 아주 작은 앞발
  const paws = `<ellipse cx="40" cy="88" rx="6" ry="4" fill="${c.body}" stroke="${c.stroke}" stroke-width="2"/>
                <ellipse cx="60" cy="88" rx="6" ry="4" fill="${c.body}" stroke="${c.stroke}" stroke-width="2"/>`;

  return `
    <svg viewBox="0 0 100 100" width="100%" height="100%">
      ${tail}
      <path d="M 25,90 C 20,60 80,60 75,90 Z" fill="${c.body}" stroke="${c.stroke}" stroke-width="3"/>
      <g transform="translate(${headX}, ${headY})">
        ${ears}
        <ellipse cx="50" cy="55" rx="35" ry="26" fill="${c.body}" stroke="${c.stroke}" stroke-width="3"/>
        ${faceDetails}
        ${eyes}
      </g>
      ${paws}
    </svg>
  `;
}

const TRAITS = [
  { id:'speedy',  label:'급식러', speedMult: 1.1,  distractChance: 0.04 },
  { id:'lazy',    label:'미식가', speedMult: 0.9,  distractChance: 0.06 },
  { id:'normal',  label:'보통냥', speedMult: 1.0,  distractChance: 0.08 },
  { id:'anxious', label:'눈치냥', speedMult: 0.95, distractChance: 0.14 },
  { id:'glutton', label:'흡입기', speedMult: 1.15, distractChance: 0.02 },
  { id:'picky',   label:'편식냥', speedMult: 0.85, distractChance: 0.10 },
];

const DISTRACT_EVENTS = [
  { label:'그루밍 촵촵🐾', pose:'groom', duration: [1680, 3360] },
  { label:'냥냥펀치! ✊',  pose:'groom', duration: [840, 1680] },
  { label:'깜빡 조는중 💤', pose:'sleep', duration: [2160, 3840] },
  { label:'딴 데 봄 👀',   pose:'idle',  duration: [1200, 2520] },
  { label:'갑자기 가렵다',  pose:'groom', duration: [1200, 2160] },
];

let animals = [];
let finishOrder = [];
let gameRunning = false;
let rafId = null;
let startTime = 0;

const rand = (min, max) => Math.random() * (max - min) + min;
const randInt = (min, max) => Math.floor(rand(min, max + 1));
const pick = arr => arr[randInt(0, arr.length - 1)];
const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

document.getElementById('start-btn').addEventListener('click', () => {
  const raw = document.getElementById('animal-input').value.trim();
  if (!raw) { alert('이름을 입력해주세요!'); return; }
  localStorage.setItem('cuteAnimalNames', raw);
  const names = raw.split(/[,\n]+/).map(s => s.trim()).filter(Boolean);
  if (names.length < 2) { alert('최소 2마리 이상 필요해요!'); return; }
  initGame(names);
});

function initGame(names) {
  animals = []; finishOrder = []; gameRunning = true;
  if (rafId) cancelAnimationFrame(rafId);
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  
  const loserCount = Math.floor((names.length - 1) / 4) + 1;
  document.getElementById('game-info').innerText = `${names.length}마리 참가 • 하위 ${loserCount}마리 벌칙`;

  const grid = document.getElementById('animal-grid');
  grid.innerHTML = '';

  const catColors = shuffle(CAT_COLOR_KEYS);
  const traitPool = shuffle([...TRAITS, ...TRAITS, ...TRAITS]).slice(0, names.length);

  names.forEach((name, i) => {
    const trait = traitPool[i % traitPool.length];
    
    // 이스터 에그 체크
    const isDog = name === '장수익';
    const isHamster = name === '박예지';
    const animalType = isDog ? 'dog' : (isHamster ? 'hamster' : 'cat');
    
    // 색상 결정: 전용 팔레트가 있으면 전용, 없으면 랜덤 고양이 색상
    let colorKey = 'golden'; // dog default
    if (isHamster) colorKey = 'cream';
    if (!isDog && !isHamster) colorKey = catColors[i % catColors.length];
    
    const baseTime = rand(10, 11.5); 
    const eatTime = baseTime / trait.speedMult + rand(-0.5, 0.5);

    const card = document.createElement('div');
    card.className = 'animal-card';
    card.innerHTML = `
      <div class="trait-badge">${trait.label}</div>
      <div class="animal-name">${name}</div>
      <div class="animal-svg-wrap" id="svg-wrap-${i}"></div>
      <div class="animal-state-label" id="state-${i}">뇸뇸뇸 🍚</div>
      <div class="bowl-wrap">
        <div class="bowl-label"><span>🍚 밥그릇</span><span id="pct-${i}">100%</span></div>
        <div class="bowl-track"><div class="bowl-bar" id="bar-${i}" style="width:100%"></div></div>
      </div>
      <div class="distract-overlay"><div class="distract-msg" id="dmsg-${i}">딴짓 중...</div></div>
    `;
    grid.appendChild(card);

    animals.push({
      i, name, trait, colorKey, eatTime, animalType,
      eaten: 0, finished: false, distracted: false,
      distractTimeLeft: 0, distractEvent: null,
      nextDistractAt: rand(1500, 3500),
      lastParticleAt: 0, bobPhase: rand(0, Math.PI * 2),
      card,
      svgWrap: document.getElementById(`svg-wrap-${i}`),
      barEl:   document.getElementById(`bar-${i}`),
      pctEl:   document.getElementById(`pct-${i}`),
      stateEl: document.getElementById(`state-${i}`),
      dmsgEl:  document.getElementById(`dmsg-${i}`),
    });
  });

  startTime = performance.now();
  prevTime = startTime;
  rafId = requestAnimationFrame(gameLoop);
}

let prevTime = 0;
function gameLoop(now) {
  const dt = Math.min((now - prevTime) / 1000, 0.1);
  prevTime = now;
  const elapsed = now - startTime;
  let allDone = true;

  animals.forEach(cat => {
    if (cat.finished) return;
    allDone = false;

    if (cat.distracted) {
      cat.distractTimeLeft -= dt * 1000;
      if (cat.distractTimeLeft <= 0) {
        cat.distracted = false;
        cat.card.classList.remove('distracted');
        cat.stateEl.innerText = '다시 뇸뇸 🍚';
        cat.nextDistractAt = elapsed + rand(2000, 5000);
      } else {
        cat.bobPhase += dt * 3;
        // 통합 getAnimalSVG 함수 호출
        cat.svgWrap.innerHTML = getAnimalSVG(cat.animalType, cat.colorKey, cat.distractEvent.pose, cat.bobPhase);
        return;
      }
    }

    if (elapsed >= cat.nextDistractAt && !cat.distracted) {
      if (Math.random() < cat.trait.distractChance) {
        cat.distracted = true;
        const ev = pick(DISTRACT_EVENTS);
        
        // 동물별 어울리는 대사 설정
        let label = ev.label;
        if (cat.animalType === 'dog' && label === '냥냥펀치! ✊') label = '멍멍펀치! ✊';
        if (cat.animalType === 'hamster' && label === '그루밍 촵촵🐾') label = '볼따구 빵빵 🐾';

        cat.distractEvent = {...ev, label}; // 복사하여 대사 수정
        cat.distractTimeLeft = rand(...ev.duration);
        cat.card.classList.add('distracted');
        cat.dmsgEl.innerText = label;
        cat.stateEl.innerText = label;
      } else {
        cat.nextDistractAt = elapsed + rand(1000, 3000);
      }
    }

    const eatRate = 1 / cat.eatTime;
    cat.eaten = Math.min(1, cat.eaten + eatRate * dt);
    cat.barEl.style.width = ((1 - cat.eaten) * 100).toFixed(1) + '%';
    cat.pctEl.innerText = Math.ceil((1 - cat.eaten) * 100) + '%';
    cat.bobPhase += dt * (cat.trait.speedMult > 1.05 ? 18 : cat.trait.speedMult < 0.95 ? 8 : 12);
    // 통합 getAnimalSVG 함수 호출
    cat.svgWrap.innerHTML = getAnimalSVG(cat.animalType, cat.colorKey, 'eat', cat.bobPhase);

    if (now - cat.lastParticleAt > rand(200, 500)) {
      spawnFoodParticle(cat.barEl);
      cat.lastParticleAt = now;
    }

    if (cat.eaten >= 1) {
      cat.finished = true;
      finishOrder.push(cat.i);
      const rank = finishOrder.length;
      // 통합 getAnimalSVG 함수 호출
      cat.svgWrap.innerHTML = getAnimalSVG(cat.animalType, cat.colorKey, 'idle', 0);
      
      // 동물별 완료 대사 설정
      let finishMsg = '다 먹었다냥! 😻';
      if (cat.animalType === 'dog') finishMsg = '다 먹었다멍! 🐶';
      if (cat.animalType === 'hamster') finishMsg = '다 먹었다찍! 🐹';
      
      cat.stateEl.innerText = finishMsg;
      cat.barEl.style.width = '0%';
      cat.pctEl.innerText = '0%';
      cat.barEl.style.background = '#E2E8F0';
      cat.card.classList.add('finished');
      cat.card.classList.remove('distracted');
      const badge = document.createElement('div');
      badge.className = `rank-badge rank-${rank <= 3 ? rank : 'other'}`;
      badge.innerText = rank <= 3 ? ['🥇','🥈','🥉'][rank-1] + ` ${rank}등` : `${rank}등`;
      cat.card.appendChild(badge);
    }
  });

  if (allDone || finishOrder.length === animals.length) {
    gameRunning = false;
    setTimeout(showResult, 800);
    return;
  }
  rafId = requestAnimationFrame(gameLoop);
}

function spawnFoodParticle(el) {
  const rect = el.getBoundingClientRect();
  const emojis = ['🍚', '✨', '🤍'];
  for (let i = 0; i < 2; i++) {
    const p = document.createElement('div');
    p.className = 'food-particle';
    p.innerText = pick(emojis);
    const dx = rand(-50, 50), dy = rand(-60, -20);
    p.style.cssText = `left:${rect.left + rect.width/2}px;top:${rect.top}px;--dx:${dx}px;--dy:${dy}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

function showResult() {
  const n = animals.length;
  const loserCount = Math.floor((n - 1) / 4) + 1;
  document.getElementById('result-desc').innerText = `총 ${n}마리 중 ${loserCount}마리 벌칙 당첨!`;
  
  const listAll = document.getElementById('result-list-all');
  const listPenalty = document.getElementById('result-list-penalty');
  listAll.innerHTML = '';
  listPenalty.innerHTML = '';

  finishOrder.forEach((ci, index) => {
    const cat = animals[ci];
    const rank = index + 1;
    const isLoser = rank > (n - loserCount);
    
    // 꼴찌는 카드 시각 효과 업데이트
    if (isLoser) {
      cat.card.classList.add('winner'); 
      cat.stateEl.innerText = '벌칙 당첨... ☕';
      cat.svgWrap.innerHTML = getAnimalSVG(cat.animalType, cat.colorKey, 'sleep', 0);
    }
    
    let rankIcon = `${rank}등`;
    if (rank === 1) rankIcon = '🥇';
    if (rank === 2) rankIcon = '🥈';
    if (rank === 3) rankIcon = '🥉';

    // 1. 전체 순위 박스 (왼쪽) 에 모두 추가
    let textColor = isLoser ? '#FF6B8B' : '#48CAE4';
    listAll.innerHTML += `
      <div class="result-row" style="animation-delay:${index * 0.1}s">
        <span class="row-rank" style="color: ${textColor};">${rankIcon}</span>
        <span class="row-name">${cat.name}</span>
        <span class="row-trait">${cat.trait.label}</span>
      </div>
    `;

    // 2. 벌칙 당첨 박스 (오른쪽) 에 당첨자만 추가
    if (isLoser) {
      listPenalty.innerHTML += `
        <div class="result-row" style="animation-delay:${index * 0.1}s">
          <span class="row-rank">☕</span>
          <span class="row-name">${cat.name}</span>
          <span class="row-trait">${cat.trait.label}</span>
        </div>
      `;
    }
  });
  document.getElementById('result-screen').style.display = 'flex';
}

document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
});
</script>
</body>
</html>
