<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIIN 프리미엄 사다리게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #05050a; overflow: hidden; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; user-select: none; }
        canvas { display: block; cursor: grab; touch-action: none; }
        canvas:active { cursor: grabbing; }
        
        #ui-panel { position: absolute; top: 20px; left: 20px; width: 360px; z-index: 10; background: rgba(10, 10, 18, 0.7); padding: 25px; border-radius: 16px; border: 1px solid rgba(0, 255, 255, 0.3); backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,255,255,0.1); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); max-height: 90vh; overflow-y: auto; }
        #ui-panel::-webkit-scrollbar { width: 6px; }
        #ui-panel::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.3); border-radius: 3px; }

        #leaderboard { position: absolute; top: 20px; right: 20px; width: 280px; z-index: 10; background: rgba(10, 10, 18, 0.7); padding: 20px; border-radius: 16px; border: 1px solid rgba(0, 255, 255, 0.3); backdrop-filter: blur(12px); color: white; display: none; box-shadow: 0 8px 32px rgba(0,255,255,0.1); }
        
        @media (max-width: 768px) {
            #ui-panel { width: 90%; left: 5%; top: 10px; max-height: 45vh; padding: 15px; }
            #leaderboard { width: 90%; left: 5%; top: auto; bottom: 10px; right: auto; max-height: 40vh; overflow-y: auto; padding: 15px; }
            .result-box { width: 95%; padding: 30px; }
        }

        .player-tag { background: rgba(0, 240, 255, 0.15); border: 1px solid #00f0ff; color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .player-tag:hover { background: rgba(0, 240, 255, 0.3); }
        .tag-remove { cursor: pointer; color: #ff0055; font-weight: bold; width: 16px; height: 16px; display: inline-flex; justify-content: center; align-items: center; border-radius: 50%; }
        .tag-remove:hover { background: rgba(255,0,85,0.2); }

        #result-modal { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 50; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .result-box { background: linear-gradient(145deg, #12121e, #0d0d16); border: 1px solid rgba(0, 255, 255, 0.4); border-radius: 24px; padding: 50px; width: 500px; max-width: 90%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05); animation: popIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .loser-name { color: #ff0055; font-size: 1.8rem; font-weight: 800; text-shadow: 0 0 15px rgba(255,0,85,0.5); margin: 8px 0; background: rgba(255,0,85,0.1); padding: 8px; border-radius: 12px; }
        
        @keyframes popIn { from { transform: scale(0.8) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        
        .neon-text { color: #fff; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(0, 255, 255, 0.3); }
        .btn-neon { background: linear-gradient(135deg, #00c6ff, #0072ff); border: none; color: white; padding: 14px; border-radius: 10px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; width: 100%; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3); }
        .btn-neon:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 114, 255, 0.5); }
        .btn-speed { background: linear-gradient(135deg, #ff0055, #ff8800); margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 85, 0, 0.3); }
        .btn-speed:hover { box-shadow: 0 6px 20px rgba(255, 85, 0, 0.5); }
        .btn-reset { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); margin-top: 12px; color: #aaa; font-weight: 600; box-shadow: none; font-size: 0.95rem; }
        .btn-reset:hover { background: rgba(255, 255, 255, 0.1); color: #fff; transform: none; }
        
        input[type="text"] { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 255, 255, 0.3); color: #fff; border-radius: 8px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: #00f0ff; background: rgba(0,0,0,0.6); }
        
        .rank-item { padding: 10px; margin-bottom: 6px; border-radius: 8px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; font-weight: 600; border-left: 3px solid transparent; transition: background 0.3s; }
        .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.15), transparent); border-left: 4px solid gold; transform: scale(1.02); }
        .rank-2 { background: linear-gradient(90deg, rgba(192,192,192,0.1), transparent); border-left: 4px solid silver; }
        .rank-3 { background: linear-gradient(90deg, rgba(205,127,50,0.1), transparent); border-left: 4px solid #cd7f32; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1 class="text-4xl font-black mb-6 neon-text text-center tracking-wide">MARBLE <span class="text-xl text-cyan-400 font-bold">ROULETTE</span></h1>
        
        <label class="text-cyan-300 text-sm font-bold mb-2 block">참가자 명단 설정</label>
        <div class="flex gap-2 mb-3">
            <input type="text" id="player-add-input" placeholder="이름 입력 후 엔터" autocomplete="off">
            <button id="add-player-btn" class="bg-cyan-600/30 border border-cyan-500 hover:bg-cyan-500 text-white font-bold rounded-lg px-4 transition-colors">+</button>
        </div>
        <div id="player-tags" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-3 bg-black/30 rounded-lg border border-gray-700/50 mb-4"></div>

        <div class="mb-6 bg-black/30 p-3 rounded-lg border border-gray-700/50 text-center">
            <span class="text-cyan-300 text-sm font-bold">자동 당첨(벌칙) 인원 설정 (총 인원/4)</span><br>
            <span id="penalty-count-display" class="text-2xl font-black text-red-400 mt-2 block">2 명</span>
        </div>
        
        <button id="start-btn" class="btn-neon">🚀 레이싱 시작!</button>
        <button id="speed-btn" class="btn-neon btn-speed">⏩ 2배속 모드 켜기</button>
        <button id="reset-btn" class="btn-neon btn-reset">⟳ 코스 무작위 재배치</button>

        <div class="mt-4 p-3 bg-gray-900/60 rounded-xl border border-gray-800 text-gray-300 text-xs">
            <span class="text-yellow-400 font-bold">💡 시스템 안내</span><br>
            • 마우스를 위아래로 드래그하여 화면을 움직일 수 있습니다.<br>
            • <b>고무줄 시스템:</b> 1등은 공기저항을 받아 느려지고, 꼴등은 미친 속도로 추격합니다! 끝까지 방심 금물.
        </div>
    </div>

    <div id="leaderboard">
        <h2 class="text-xl font-bold mb-4 text-cyan-300 border-b border-gray-700 pb-2 flex justify-between">
            <span>🏆 실시간 랭킹</span>
            <span id="live-status" class="text-xs bg-cyan-900 text-cyan-100 px-2 py-1 rounded">대기중</span>
        </h2>
        <div id="rank-list"></div>
    </div>

    <div id="result-modal">
        <div class="result-box">
            <h2 class="text-4xl font-black text-yellow-400 mb-2">🎉 레이싱 종료 🎉</h2>
            <p class="text-gray-400 mb-6 pb-4 border-b border-gray-700">최후의 승부가 마무리되었습니다.</p>
            
            <h3 class="text-2xl font-bold text-white mb-4">💥 당첨 (벌칙) 💥</h3>
            <div id="losers-list" class="flex flex-col gap-2 mb-8"></div>
            
            <button onclick="closeResult()" class="btn-neon" style="background: linear-gradient(135deg, #11998e, #38ef7d);">새로운 레이스 준비</button>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        let playersData = ['철수', '영희', '민수', '지영', '동해', '백두', '한라', '태백'];
        let savedPlayers = localStorage.getItem('kiin_players');
        if (savedPlayers) { try { playersData = JSON.parse(savedPlayers); } catch(e) {} }
        
        const colors = ['#00ffff', '#ff00ff', '#00ff00', '#ffff00', '#ff5500', '#0088ff', '#ff0055', '#aaff00', '#ffffff', '#ff8800', '#ffb0b0', '#b0ffb0'];

        function saveData() { localStorage.setItem('kiin_players', JSON.stringify(playersData)); }
        function updatePenaltyDisplay() { document.getElementById('penalty-count-display').innerText = Math.floor(playersData.length / 4) + ' 명'; }

        function renderPlayerTags() {
            const container = document.getElementById('player-tags');
            container.innerHTML = '';
            playersData.forEach((player, index) => {
                const color = colors[index % colors.length];
                container.innerHTML += `
                    <div class="player-tag">
                        <span style="width:10px; height:10px; border-radius:50%; background-color:${color}; box-shadow: 0 0 5px ${color}"></span>
                        ${player}
                        <span class="tag-remove" onclick="removePlayer(${index})">×</span>
                    </div>`;
            });
            updatePenaltyDisplay(); saveData();
        }

        function addPlayer() {
            const input = document.getElementById('player-add-input');
            const name = input.value.trim();
            if(name) {
                if (playersData.includes(name)) return alert('이미 등록된 참가자입니다.');
                playersData.push(name); input.value = ''; renderPlayerTags(); buildMap(); 
            }
        }
        function removePlayer(index) { playersData.splice(index, 1); renderPlayerTags(); buildMap(); }

        document.getElementById('player-add-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') addPlayer(); });
        document.getElementById('add-player-btn').addEventListener('click', addPlayer);
        renderPlayerTags();

        // --- 물리 엔진 ---
        const Engine = Matter.Engine, Runner = Matter.Runner, Bodies = Matter.Bodies, Body = Matter.Body, Composite = Matter.Composite, Events = Matter.Events;

        let engine, runner, world;
        let marbles = [], particles = [], finishedMarbles = [], dynamicObstacles = [];
        let isFastForward = false;
        
        const MAP_WIDTH = 1600;
        let MAP_HEIGHT = 7500; 
        let FINISH_LINE = MAP_HEIGHT - 300;
        let cameraY = 0, cameraZoom = 1; 
        const BASE_GRAVITY = 1.6; 
        
        let isDragging = false, previousMouseY = 0, lastInteractionTime = Date.now();

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let frameCounter = 0;

        function init() {
            engine = Engine.create();
            engine.enableSleeping = false; 
            world = engine.world;
            world.gravity.y = BASE_GRAVITY; 

            handleResize();
            window.addEventListener('resize', handleResize);

            buildMap();
            setupCameraControls();

            // 충돌 시 화려한 네온 파티클 생성
            Events.on(engine, 'collisionStart', (event) => {
                event.pairs.forEach(pair => {
                    let m = pair.bodyA.label === 'marble' ? pair.bodyA : (pair.bodyB.label === 'marble' ? pair.bodyB : null);
                    let b = pair.bodyA.label === 'bumper' ? pair.bodyA : (pair.bodyB.label === 'bumper' ? pair.bodyB : null);
                    let pin = pair.bodyA.label === 'pin' ? pair.bodyA : (pair.bodyB.label === 'pin' ? pair.bodyB : null);
                    
                    if (m && b) {
                        createParticles(m.position.x, m.position.y, '#ff00aa', 15, 25);
                    } else if (m && pin) {
                        // 핀과 부딪히면 작고 약한 불꽃
                        if (Math.random() > 0.5) createParticles(m.position.x, m.position.y, '#00ffcc', 3, 5);
                    }
                });
            });

            runner = Runner.create({ isFixed: true, delta: 1000 / 60 });
            Runner.run(runner, engine);
            Events.on(engine, 'beforeUpdate', updateLogic); 
            requestAnimationFrame(render);
        }

        // 2배속 모드 토글
        document.getElementById('speed-btn').addEventListener('click', (e) => {
            isFastForward = !isFastForward;
            engine.timing.timeScale = isFastForward ? 2.0 : 1.0;
            e.target.innerHTML = isFastForward ? '▶️ 정상 속도 복귀' : '⏩ 2배속 모드 켜기';
            e.target.style.background = isFastForward ? 'linear-gradient(135deg, #00c6ff, #0072ff)' : 'linear-gradient(135deg, #ff0055, #ff8800)';
        });

        function setupCameraControls() {
            const pointerDown = (y) => { isDragging = true; previousMouseY = y; lastInteractionTime = Date.now(); };
            const pointerMove = (y) => {
                if (isDragging) { cameraY -= (y - previousMouseY) / cameraZoom; previousMouseY = y; lastInteractionTime = Date.now(); }
            };
            const pointerUp = () => { isDragging = false; lastInteractionTime = Date.now(); };

            canvas.addEventListener('mousedown', (e) => pointerDown(e.clientY));
            window.addEventListener('mousemove', (e) => pointerMove(e.clientY));
            window.addEventListener('mouseup', pointerUp);
            canvas.addEventListener('touchstart', (e) => pointerDown(e.touches[0].clientY), {passive: false});
            window.addEventListener('touchmove', (e) => { pointerMove(e.touches[0].clientY); e.preventDefault(); }, {passive: false});
            window.addEventListener('touchend', pointerUp);
        }

        function handleResize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            cameraZoom = Math.min(0.8, Math.max(0.3, window.innerWidth / (MAP_WIDTH + 600)));
        }

        function buildMap() {
            Composite.clear(world); Engine.clear(engine);
            marbles = []; finishedMarbles = []; particles = []; dynamicObstacles = [];
            cameraY = -300; world.gravity.y = BASE_GRAVITY;
            document.getElementById('live-status').innerText = '대기중';
            document.getElementById('live-status').style.backgroundColor = '#0088ff';
            
            // 인원수에 비례해 맵 길이 조절
            MAP_HEIGHT = Math.max(7000, 4000 + (playersData.length * 700));
            FINISH_LINE = MAP_HEIGHT - 300;

            document.getElementById('leaderboard').style.display = 'none';
            document.getElementById('result-modal').style.display = 'none';

            const wallOpts = { isStatic: true, label: 'wall', friction: 0, restitution: 0.5 };
            let elements = [
                Bodies.rectangle(-50, MAP_HEIGHT/2, 100, MAP_HEIGHT + 1000, wallOpts),
                Bodies.rectangle(MAP_WIDTH + 50, MAP_HEIGHT/2, 100, MAP_HEIGHT + 1000, wallOpts)
            ];

            let currentY = 500;
            let sectionIndex = 0;
            
            // 무조건 공간이 확보되는 4가지 테마를 번갈아가며 생성
            while (currentY < MAP_HEIGHT - 1200) {
                let type = sectionIndex % 4; 
                
                if (type === 0) {
                    // 테마 1: 깔때기 (거대 유도선)
                    elements.push(Bodies.rectangle(MAP_WIDTH/2 - 500, currentY, 1000, 40, { isStatic: true, angle: 0.35, label: 'wall', friction: 0, chamfer:{radius:20} }));
                    elements.push(Bodies.rectangle(MAP_WIDTH/2 + 500, currentY, 1000, 40, { isStatic: true, angle: -0.35, label: 'wall', friction: 0, chamfer:{radius:20} }));
                    currentY += 600;
                    
                } else if (type === 1) {
                    // 테마 2: 거대 핀볼(Plinko) 밭 - 아케이드 감성의 핵심
                    let rows = 0;
                    for (let py = currentY; py < currentY + 1200; py += 140) {
                        let offset = (rows % 2 === 0) ? 0 : 70;
                        for (let px = 200; px < MAP_WIDTH - 150; px += 140) {
                            elements.push(Bodies.circle(px + offset, py, 18, { 
                                isStatic: true, restitution: 0.7, friction: 0, label: 'pin'
                            }));
                        }
                        rows++;
                    }
                    currentY += 1400;
                    
                } else if (type === 2) {
                    // 테마 3: 안전 보장 거대 육각형(Hexagon) 스피너
                    // 십자가처럼 좁은 구석이 없어 끼이지 않음
                    let hexagon = Bodies.polygon(MAP_WIDTH/2, currentY + 300, 6, 250, { 
                        isStatic: true, restitution: 0.8, friction: 0, label: 'hexagon',
                        plugin: { type: 'spinner', speed: (Math.random() > 0.5 ? 0.05 : -0.05) } 
                    });
                    elements.push(hexagon); dynamicObstacles.push(hexagon);
                    
                    // 육각형 양옆에 튕겨내는 마젠타 범퍼 추가
                    elements.push(Bodies.circle(200, currentY + 300, 45, { isStatic: true, restitution: 1.5, friction: 0, label: 'bumper' }));
                    elements.push(Bodies.circle(MAP_WIDTH - 200, currentY + 300, 45, { isStatic: true, restitution: 1.5, friction: 0, label: 'bumper' }));
                    
                    currentY += 800;
                    
                } else {
                    // 테마 4: 지그재그 슬로프 & 슬라이더 구간
                    let isLeft = Math.random() > 0.5;
                    let x = isLeft ? 300 : MAP_WIDTH - 300;
                    let angle = isLeft ? 0.35 : -0.35; 
                    
                    elements.push(Bodies.rectangle(x, currentY, 1100, 40, { 
                        isStatic: true, angle: angle, friction: 0, restitution: 0.4, label: 'wall', chamfer: {radius: 20} 
                    }));
                    
                    // 빈 쪽에 튕기는 범퍼를 배치하여 재미 추가
                    let bumperX = isLeft ? MAP_WIDTH - 300 : 300;
                    elements.push(Bodies.circle(bumperX, currentY + 150, 40, { isStatic: true, restitution: 1.5, friction: 0, label: 'bumper' }));
                    
                    // 그 아래에 움직이는 슬라이더 판
                    let slider = Bodies.rectangle(MAP_WIDTH/2, currentY + 500, 400, 30, { 
                        isStatic: true, restitution: 0.5, chamfer: {radius: 15}, friction: 0, label: 'slider',
                        plugin: { type: 'slider', startX: MAP_WIDTH/2, range: 400, speed: 0.04, offset: 0 } 
                    });
                    elements.push(slider); dynamicObstacles.push(slider);
                    
                    currentY += 800;
                }
                sectionIndex++;
            }

            // 하단 결승선 칸막이
            for (let i = 1; i < 10; i++) {
                elements.push(Bodies.rectangle(i * (MAP_WIDTH / 10), MAP_HEIGHT - 200, 20, 600, { isStatic: true, restitution: 0.5, label: 'wall', friction: 0 }));
            }

            Composite.add(world, elements);
        }

        function startRace() {
            if(playersData.length === 0) return alert("참가자를 최소 1명 이상 추가해주세요!");
            if(marbles.length > 0) buildMap();
            
            const isMobile = window.innerWidth <= 768;
            document.getElementById('ui-panel').style.transform = isMobile ? 'translateY(-200%) scale(0.9)' : 'translateY(-150%) scale(0.9)';
            document.getElementById('ui-panel').style.opacity = '0';
            document.getElementById('leaderboard').style.display = 'block';
            document.getElementById('live-status').innerText = '진행중';
            document.getElementById('live-status').style.backgroundColor = '#ff0055';

            playersData.forEach((name, i) => {
                const marble = Bodies.circle((MAP_WIDTH / 2) + (Math.random() * 800 - 400), -300 - (i * 80), 24, { 
                    restitution: 0.6, friction: 0, frictionAir: 0.015, density: 0.08, 
                    label: 'marble',
                    plugin: { 
                        name: name, color: colors[i % colors.length], trail: [], 
                        finished: false, stopped: false, rank: 0
                    }
                });
                Body.setVelocity(marble, { x: (Math.random() - 0.5) * 10, y: 10 });
                marbles.push(marble);
                Composite.add(world, marble);
            });
            
            lastInteractionTime = Date.now();
        }

        function showResultScreen() {
            const numLosers = Math.floor(playersData.length / 4);
            const losersList = document.getElementById('losers-list');
            losersList.innerHTML = '';
            
            if (numLosers === 0) {
                losersList.innerHTML = `<div class="text-white text-lg">인원수가 적어 당첨자가 없습니다! 🕊️</div>`;
            } else {
                const losers = finishedMarbles.slice(-numLosers);
                losers.forEach(loser => {
                    createParticles(loser.position.x, loser.position.y, '#ff0055', 80, 25);
                    Body.setPosition(loser, {x: -2000, y: -2000}); 
                });
                losers.reverse().forEach(loser => { 
                    losersList.innerHTML += `<div class="loser-name">${loser.plugin.name} <span class="text-sm font-normal text-white opacity-70">(${loser.plugin.rank}등)</span></div>`;
                });
            }
            document.getElementById('result-modal').style.display = 'flex';
        }

        function closeResult() {
            document.getElementById('result-modal').style.display = 'none';
            buildMap();
            document.getElementById('ui-panel').style.transform = 'translateY(0) scale(1)';
            document.getElementById('ui-panel').style.opacity = '1';
        }

        function updateLogic() {
            // [핵심 로직] 러버밴딩 (고무줄) 효과 적용 - 1등부터 꼴등까지 박진감 넘치게 유지
            let activeMarbles = marbles.filter(m => !m.plugin.finished);
            if (activeMarbles.length > 1) {
                let leaderY = Math.max(...activeMarbles.map(m => m.position.y));
                let lastY = Math.min(...activeMarbles.map(m => m.position.y));
                let spread = leaderY - lastY;
                
                if (spread > 0) {
                    activeMarbles.forEach(m => {
                        // relativePos: 1에 가까울수록 선두, 0에 가까울수록 후미
                        let relativePos = (m.position.y - lastY) / spread;
                        
                        // 선두는 공기 저항이 커져서 느려지고, 꼴등은 저항이 거의 없어 광속으로 추격
                        m.frictionAir = 0.002 + (relativePos * 0.025); 
                    });
                }
            }

            // 움직이는 장애물 회전/이동 업데이트
            dynamicObstacles.forEach(obs => {
                if (obs.plugin.type === 'spinner') {
                    Body.setAngle(obs, obs.angle + obs.plugin.speed);
                } else if (obs.plugin.type === 'slider') {
                    let newX = obs.plugin.startX + Math.sin(frameCounter * obs.plugin.speed + obs.plugin.offset) * obs.plugin.range;
                    Body.setPosition(obs, { x: newX, y: obs.position.y });
                }
            });
        }

        function createParticles(x, y, color, count, speed=15) { 
            for(let i=0; i<count; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed, life: 1.0, color: color }); 
        }

        function render() {
            frameCounter++;
            
            // 네온풍 그라데이션 배경
            let bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, '#04040a');
            bgGradient.addColorStop(1, '#110a22');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let viewHeightInWorld = canvas.height / cameraZoom;
            
            // 2초 미조작 시 꼴등(후미 그룹) 추적 로직 유지
            if (!isDragging && Date.now() - lastInteractionTime > 2000 && marbles.length > 0) {
                let lastPlaceY = Infinity;
                marbles.forEach(m => { if (!m.plugin.finished && m.position.y < lastPlaceY) lastPlaceY = m.position.y; });
                if (lastPlaceY === Infinity && finishedMarbles.length > 0) lastPlaceY = FINISH_LINE; 
                
                if (lastPlaceY !== Infinity && lastPlaceY > -400) { 
                    let targetCameraY = lastPlaceY - (viewHeightInWorld * 0.4); 
                    if (targetCameraY > MAP_HEIGHT - viewHeightInWorld + 200) targetCameraY = MAP_HEIGHT - viewHeightInWorld + 200;
                    if (targetCameraY < -500) targetCameraY = -500;
                    cameraY += (targetCameraY - cameraY) * 0.05; 
                }
            } else {
                let maxCamY = MAP_HEIGHT - viewHeightInWorld + 500;
                if (cameraY > maxCamY) cameraY = maxCamY;
                if (cameraY < -1000) cameraY = -1000;
            }

            // 시각적 공간감을 주는 배경 그리드 망
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            let gridY = (cameraY * cameraZoom) % 100;
            for(let i = 0; i < canvas.height + 100; i += 100) { ctx.beginPath(); ctx.moveTo(0, i - gridY); ctx.lineTo(canvas.width, i - gridY); ctx.stroke(); }
            for(let i = 0; i < canvas.width; i += 100) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }

            const viewTop = cameraY - 300, viewBottom = cameraY + viewHeightInWorld + 300;

            ctx.save();
            ctx.translate(canvas.width / 2, 0); 
            ctx.scale(cameraZoom, cameraZoom); 
            ctx.translate(-MAP_WIDTH / 2, -cameraY);

            // 일반 벽 및 장애물 (Slider, Hexagon 등) 렌더링
            ctx.lineWidth = 2;
            world.bodies.forEach(b => {
                if(b.bounds.max.y < viewTop || b.bounds.min.y > viewBottom || b.label==='marble' || b.label==='bumper' || b.label==='pin') return;
                
                ctx.beginPath();
                b.parts.forEach((p, i) => { 
                    if(i===0 && b.parts.length>1) return; 
                    ctx.moveTo(p.vertices[0].x, p.vertices[0].y); 
                    for(let j=1;j<p.vertices.length;j++) ctx.lineTo(p.vertices[j].x, p.vertices[j].y); 
                    ctx.lineTo(p.vertices[0].x, p.vertices[0].y); 
                });
                
                if (b.label === 'hexagon') {
                    // 거대 육각형 스피너 (네온 오렌지 글로우)
                    ctx.fillStyle = 'rgba(255, 165, 0, 0.15)'; 
                    ctx.strokeStyle = '#ffa500';
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ffa500';
                } else if (b.label === 'slider') {
                    // 슬라이더 (네온 핑크 글로우)
                    ctx.fillStyle = 'rgba(255, 0, 255, 0.15)'; 
                    ctx.strokeStyle = '#ff00ff';
                } else {
                    // 일반 벽 (네온 시안)
                    ctx.fillStyle = 'rgba(0, 240, 255, 0.08)'; 
                    ctx.strokeStyle = 'rgba(0, 240, 255, 0.6)';
                }
                ctx.fill(); ctx.stroke();
                ctx.shadowBlur = 0; // 초기화
            });

            // 핀볼(Pin) & 범퍼 렌더링 (아케이드 감성 글로우 효과)
            let pulse = Math.abs(Math.sin(frameCounter * 0.1)) * 5;
            world.bodies.forEach(b => { 
                if((b.label==='bumper' || b.label==='pin') && b.position.y > viewTop && b.position.y < viewBottom) { 
                    ctx.beginPath();
                    
                    if(b.label==='bumper') {
                        // 튕겨내는 범퍼 (마젠타 펄스)
                        ctx.arc(b.position.x, b.position.y, b.circleRadius + pulse, 0, 2*Math.PI); 
                        ctx.fillStyle = 'rgba(255, 0, 170, 0.2)'; ctx.fill();
                        
                        ctx.beginPath();
                        ctx.arc(b.position.x, b.position.y, b.circleRadius, 0, 2*Math.PI); 
                        ctx.fillStyle = '#ff00aa'; 
                        ctx.shadowBlur = 15; ctx.shadowColor = '#ff00aa'; 
                        ctx.fill(); ctx.shadowBlur = 0;
                    } else {
                        // Plinko 핀 (야광 민트/옐로우)
                        ctx.arc(b.position.x, b.position.y, b.circleRadius, 0, 2*Math.PI); 
                        ctx.fillStyle = '#fff'; 
                        ctx.shadowBlur = 12; ctx.shadowColor = '#00ffcc'; 
                        ctx.fill(); ctx.shadowBlur = 0;
                    }
                }
            });

            // 결승선 렌더링
            if (FINISH_LINE > viewTop && FINISH_LINE < viewBottom) {
                ctx.beginPath(); ctx.moveTo(0, FINISH_LINE); ctx.lineTo(MAP_WIDTH, FINISH_LINE); 
                ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 6; ctx.setLineDash([20, 15]); 
                ctx.shadowBlur = 15; ctx.shadowColor = '#ffff00';
                ctx.stroke(); ctx.setLineDash([]); ctx.shadowBlur = 0;
            }

            // 부딪힐 때 나오는 파티클 렌더링
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                if (p.y >= viewTop && p.y <= viewBottom) { 
                    ctx.globalAlpha = p.life; ctx.fillStyle = p.color; 
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.life*6, 0, Math.PI*2); ctx.fill(); 
                }
            }
            ctx.globalAlpha = 1.0;

            if (frameCounter % 15 === 0 && marbles.length > 0) updateLeaderboard();

            // 공 렌더링 및 결승선 통과 처리
            marbles.forEach(m => {
                let p = m.plugin;
                if (!p.finished && m.position.y > FINISH_LINE) {
                    p.finished = true; p.rank = finishedMarbles.length + 1; finishedMarbles.push(m);
                    setTimeout(() => { p.stopped = true; Body.setStatic(m, true); }, 1500); 
                    createParticles(m.position.x, m.position.y, p.color, 50, 20);
                    if(finishedMarbles.length === marbles.length) setTimeout(showResultScreen, 1500);
                }

                if (!p.stopped) { p.trail.push({x: m.position.x, y: m.position.y}); if (p.trail.length > 15) p.trail.shift(); }

                if (p.trail.length > 1 && m.position.y >= viewTop && m.position.y <= viewBottom) {
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = m.circleRadius * 1.5; ctx.strokeStyle = p.color;
                    ctx.beginPath(); ctx.moveTo(p.trail[0].x, p.trail[0].y); for (let i=1; i<p.trail.length; i++) ctx.lineTo(p.trail[i].x, p.trail[i].y);
                    ctx.globalAlpha = 0.25; ctx.stroke(); ctx.globalAlpha = 1.0;
                }

                if (m.position.y >= viewTop && m.position.y <= viewBottom) {
                    ctx.beginPath(); ctx.arc(m.position.x, m.position.y, m.circleRadius + 5, 0, 2*Math.PI);
                    ctx.fillStyle = p.color; ctx.globalAlpha = 0.3; ctx.fill(); ctx.globalAlpha = 1.0;

                    ctx.beginPath(); ctx.arc(m.position.x, m.position.y, m.circleRadius, 0, 2*Math.PI);
                    ctx.fillStyle = '#fff'; ctx.fill();
                    ctx.strokeStyle = p.color; ctx.lineWidth = 4; ctx.stroke(); 

                    if (p.finished) {
                        let fontSize = 20;
                        ctx.font = `bold ${fontSize}px "Pretendard", sans-serif`;
                        const badgeWidth = ctx.measureText(p.name).width + 16;
                        const badgeY = m.position.y - m.circleRadius - 25;

                        ctx.fillStyle = 'rgba(0, 0, 0, 0.75)'; ctx.beginPath(); ctx.roundRect(m.position.x - badgeWidth/2, badgeY, badgeWidth, fontSize+10, 8); ctx.fill(); 
                        ctx.strokeStyle = p.color; ctx.lineWidth = 1.5; ctx.stroke();

                        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(p.name, m.position.x, badgeY + (fontSize+10)/2);
                        
                        ctx.font = '900 32px "Pretendard"';
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(m.position.x - 35, m.position.y - m.circleRadius - 90, 70, 40);
                        ctx.fillStyle = 'gold'; ctx.fillText(p.rank+'등', m.position.x, m.position.y - m.circleRadius - 70);
                    }
                }
            });

            ctx.restore();
            requestAnimationFrame(render);
        }

        function updateLeaderboard() {
            if(marbles.length === 0) return;
            let sorted = [...marbles].sort((a, b) => {
                if (a.plugin.finished && b.plugin.finished) return a.plugin.rank - b.plugin.rank;
                if (a.plugin.finished) return -1; if (b.plugin.finished) return 1; return b.position.y - a.position.y;
            });

            document.getElementById('rank-list').innerHTML = sorted.map((m, idx) => {
                let css = 'rank-item' + (idx<3 ? ` rank-${idx+1}` : '');
                let status = m.plugin.finished ? '🏁 도착' : Math.floor((m.position.y / FINISH_LINE) * 100) + '%';
                return `<div class="${css}">
                            <div class="flex items-center gap-2">
                                <span class="w-5 text-center text-white">${idx+1}</span>
                                <span class="w-3 h-3 rounded-full" style="background-color:${m.plugin.color}; box-shadow: 0 0 5px ${m.plugin.color}"></span>
                                <span class="text-white">${m.plugin.name}</span>
                            </div>
                            <span class="text-xs text-gray-400">${status}</span>
                         </div>`;
            }).join('');
        }

        document.getElementById('start-btn').addEventListener('click', startRace);
        document.getElementById('reset-btn').addEventListener('click', () => { 
            buildMap(); 
            document.getElementById('ui-panel').style.transform = 'translateY(0) scale(1)'; 
            document.getElementById('ui-panel').style.opacity = '1'; 
            document.getElementById('leaderboard').style.display = 'none'; 
        });

        init();
    </script>
</body>
</html>
